<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap" rel="stylesheet">
    <title>All Dogs Go to Heaven</title>
</head>

<body>
    <div class="main_container">
        <nav class="navbar">
            <ul>
                <a class="home" href="">
                    <li>Home</li>
                </a>
                <a class="about" href="">
                    <li>About</li>
                </a>
                <a class="project" href="">
                    <li>Projects</li>
                </a>
                <a class="contact" href="">
                    <li>Contact</li>
                </a>
            </ul>
        </nav>
        <section class="main">
            <img class="toledo" src="toledo.png" alt="">
        </section>
        <section class="project-header">
            <div class="project-line">
                <hr>
            </div>
            <div class="project-head">
                <h3>Featured Projects</h3>
            </div>
            <div class="project-line">
                <hr>
            </div>
        </section>
        <section class="grid">
            <div class="grid-items grid1 "><img class=" project_pic item1" src="constuct.jpg" alt="Unavailable"></div>
            <div class="grid-items  grid2"><img class="project_pic item2" src="constuct.jpg" alt="Unavailable"></div>
            <div class="grid-items grid3"><img class="project_pic item3" src="constuct.jpg" alt="Unavailable"></div>
        </section>

        <div class="bottom-project area">
            <hr class="hr-bottom">
        </div>

        <footer class="footer">
            <div class="favicon">
                <img class="icon" src="facebook.png" alt="">
            </div>
            <div class="favicon"><img class="icon" src="instagram.png" alt=""></div>
            <div class="favicon"><img class="icon" src="linkedin.png" alt=""></div>
        </footer>
    </div>
</body>

</html>
